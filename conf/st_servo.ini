# st_servo.ini — Sample configuration for the YARP st_servo device plugin.
#
# Copy this file to the appropriate location and edit as needed.
#
# --- Standalone (yarpdev, hardware driver only) ----------------------------
#
#   yarpdev --device st_servo \
#           --port /dev/ttyUSB0 \
#           --baud 1000000 \
#           --servo_ids "(30 31 32 33 34 35 40 41 42 43 44 45 50 10 11 12 13 14 20 21 22 23 24)"
#
# --- Wrapped (YARP 3.12+, exposes RPC/state/command ports on the network) --
#
#   yarpdev --device deviceBundler \
#           --wrapper_device controlBoard_nws_yarp \
#           --attached_device st_servo \
#           --from conf/st_servo.ini
#
# --- Using this .ini file with yarpdev -------------------------------------
#
#   yarpdev --from st_servo.ini
#
# --------------------------------------------------------------------------

# Top-level keys are visible to all sub-devices (controlBoard_nws_yarp reads
# 'name' and 'period' directly from this scope).
name    /beta/body
period  10

device          deviceBundler
wrapper_device  controlBoard_nws_yarp
attached_device st_servo

# Serial port to the RS-485 servo bus adapter
port        /dev/ttyUSB0

# Baud rate — must match the servo chain setting.
# ST3215 default is 1 000 000 bps (register BAUD_RATE=0).
# Other rates: 500000, 250000, 115200, 57600.
baud        1000000

# Read timeout in milliseconds (default: 50 ms)
timeout_ms  50

# Ordered list of servo IDs present on the bus.
# Indices in this list become the YARP joint numbers (0-based).
#
# Humanoid robot configuration (23 DOF total):
#   Joints  0-5  → Left leg   (IDs 30-35: hip to ankle)
#   Joints  6-11 → Right leg  (IDs 40-45: hip to ankle)
#   Joint  12    → Legs common servo (ID 50: waist/torso)
#   Joints 13-17 → Left arm   (IDs 10-14: shoulder to wrist)
#   Joints 18-22 → Right arm  (IDs 20-24: shoulder to wrist)
#
servo_ids   (30 31 32 33 34 35  40 41 42 43 44 45  50  10 11 12 13 14  20 21 22 23 24)
# Automatically set RESPONSE_LEVEL=1 on any servo that does not respond to
# READ commands (ST factory default is 0 = ping-only).
# Set to false if your servos are already configured to return read responses.
auto_response_level  true